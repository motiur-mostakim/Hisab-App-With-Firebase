name: hisab_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  cloud_firestore:
  uuid: ^4.0.0
  image_picker: ^0.8.8
  firebase_storage:
  math_expressions: ^3.1.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  firebase_messaging:
  firebase_in_app_messaging:
  http: ^1.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/HisabDaily.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/HisabDaily.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
